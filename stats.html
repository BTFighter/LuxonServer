<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Performance Metrics</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        /* Page Specific Layouts */
        .controls-row {
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 0.75rem;
            color: var(--brand-green);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Chart Container */
        .chart-container {
            position: relative;
            height: 400px;
            width: 100%;
        }
    </style>
    </style>
</head>
<body>

<header>
    <h1>Luxon <span>Metrics</span></h1>
    </header>

<main>
    <div class="panel">
        <div class="panel-header">
            <h2>Configuration</h2>
            <div class="status-dot status-green" id="connectionStatus" style="display:none;"></div>
        </div>
        <div class="controls-row">

            <div class="input-group">
                <label for="sourceSelect">Data Source</label>
                <select id="sourceSelect">
                    <option value="busy_time" selected>Busy Time</option>
                    <option value="idle_time">Idle Time</option>
                    <option value="load">Server Load</option>
                </select>
            </div>

            <div class="input-group">
                <label for="metricSelect">Metric Aggregation</label>
                <select id="metricSelect">
                    <option value="min">Minimum</option>
                    <option value="avg" selected>Average</option>
                    <option value="max">Maximum</option>
                </select>
            </div>

            <div class="input-group">
                <label for="durationInput">Window (ms)</label>
                <input type="number" id="durationInput" value="1000" min="50" step="50">
            </div>

            <div class="input-group">
                <label>&nbsp;</label>
                <div class="controls">
                    <button id="startBtn" class="primary">Start Monitor</button>
                    <button id="stopBtn">Stop</button>
                </div>
            </div>
        </div>
    </div>

    <div class="panel">
        <div class="panel-header">
            <h2 id="chartTitle">Live Monitor</h2>
            <div class="controls">
                <span style="color: var(--text-muted); font-size: 0.9rem;">Current: </span>
                <span id="currentVal" style="font-weight: bold; margin-left: 5px; color: var(--brand-green); font-family: var(--font-mono);">--</span>
            </div>
        </div>
        <div class="chart-container">
            <canvas id="statsChart"></canvas>
        </div>
    </div>
</main>

<script>
    // --- State Management ---
    let intervalId = null;
    let chartInstance = null;
    let dataPoints = [];
    let labels = [];
    const MAX_DATA_POINTS = 50;

    // --- DOM Elements ---
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const sourceSelect = document.getElementById('sourceSelect');
    const metricSelect = document.getElementById('metricSelect');
    const durationInput = document.getElementById('durationInput');
    const currentValDisplay = document.getElementById('currentVal');
    const chartTitle = document.getElementById('chartTitle');

    // --- Chart Initialization ---
    function initChart() {
        const ctx = document.getElementById('statsChart').getContext('2d');

        // Luxon Themed Colors
        const gridColor = 'rgba(255, 255, 255, 0.1)';
        const textColor = '#b3c2d1';
        const brandGreen = '#bfff00';
        const brandGreenDim = 'rgba(191, 255, 0, 0.1)';

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Value',
                    data: dataPoints,
                    borderColor: brandGreen,
                    backgroundColor: brandGreenDim,
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3,
                    pointRadius: 2,
                    pointBackgroundColor: brandGreen
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: {
                        grid: { color: gridColor },
                        ticks: { color: textColor, display: false }
                    },
                    y: {
                        grid: { color: gridColor },
                        ticks: { color: textColor },
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: {
                        labels: { color: textColor }
                    }
                }
            }
        });
    }

    // --- Data Fetching Logic ---
    async function fetchFromEndpoint(endpoint, metric, duration) {
        try {
            const response = await fetch(`/stats/${endpoint}/${metric}/${duration}`);
            if (!response.ok) throw new Error(`Error fetching ${endpoint}`);
            return await response.json();
        } catch (error) {
            console.error("Fetch error:", error);
            return null;
        }
    }

    async function getNextDataPoint(source, metric, duration) {
        if (source === 'load') {
            try {
                const [busy, idle] = await Promise.all([
                    fetchFromEndpoint('busy_time', metric, duration),
                    fetchFromEndpoint('idle_time', metric, duration)
                ]);

                if (busy === null || idle === null) return null;

                const total = busy + idle;
                if (total === 0) return 0;

                return (busy / total) * 100;
            } catch (e) {
                console.error("Calculation error", e);
                return null;
            }
        } else {
            return await fetchFromEndpoint(source, metric, duration);
        }
    }

    function updateGraph(value, source) {
        if (value === null) return;

        const now = new Date();
        const timeLabel = now.getHours() + ':' + now.getMinutes() + ':' + now.getSeconds();

        labels.push(timeLabel);
        dataPoints.push(value);

        if (labels.length > MAX_DATA_POINTS) {
            labels.shift();
            dataPoints.shift();
        }

        let unit = 'µs';
        let label = 'Execution Time';

        if (source === 'load') {
            unit = '%';
            label = 'Server Load';
            value = parseFloat(value).toFixed(2);
        } else if (source === 'idle_time') {
            label = 'Idle Time';
        } else {
            label = 'Busy Time';
        }

        chartTitle.innerText = `${label} (${source === 'load' ? 'Percentage' : 'Microseconds'})`;
        currentValDisplay.innerText = `${value} ${unit}`;

        chartInstance.data.datasets[0].label = `${label} (${unit})`;
        chartInstance.update();
    }

    // --- Control Logic ---
    function startMonitoring() {
        if (intervalId) clearInterval(intervalId);

        labels.length = 0;
        dataPoints.length = 0;

        const source = sourceSelect.value;
        const metric = metricSelect.value;
        const duration = parseInt(durationInput.value, 10);

        if (isNaN(duration) || duration < 50) {
            alert("Please enter a valid duration (minimum 50ms).");
            return;
        }

        if (source === 'load') {
            chartInstance.options.scales.y.max = 100;
        } else {
            delete chartInstance.options.scales.y.max;
        }
        chartInstance.update();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        sourceSelect.disabled = true;
        metricSelect.disabled = true;
        durationInput.disabled = true;

        const runFetch = async () => {
            const val = await getNextDataPoint(source, metric, duration);
            updateGraph(val, source);
        };

        runFetch();
        intervalId = setInterval(runFetch, duration);
    }

    function stopMonitoring() {
        if (intervalId) clearInterval(intervalId);
        intervalId = null;

        startBtn.disabled = false;
        stopBtn.disabled = true;
        sourceSelect.disabled = false;
        metricSelect.disabled = false;
        durationInput.disabled = false;
    }

    startBtn.addEventListener('click', startMonitoring);
    stopBtn.addEventListener('click', stopMonitoring);

    // Initialize
    initChart();
    stopBtn.disabled = true;

</script>

</body>
</html>
