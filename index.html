<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxon Server Monitor</title>
<style>
:root {
    --bg-body: #ffffff;
    --bg-panel: #f8f9fa;
    --bg-header: #eeeeee;
    --text-main: #000000;
    --text-muted: #555555;
    --border-color: #cccccc;
    --accent-color: #0055cc;
    --accent-hover: #003399;
    --state-success: #28a745;
    --state-danger: #dc3545;
    --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

[data-theme="dark"] {
    --bg-body: #121212;
    --bg-panel: #1e1e1e;
    --bg-header: #2d2d2d;
    --text-main: #e0e0e0;
    --text-muted: #aaaaaa;
    --border-color: #444444;
    --accent-color: #64b5f6;
    --accent-hover: #9be7ff;
    --state-success: #81c784;
    --state-danger: #e57373;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: var(--font-stack);
    background-color: var(--bg-body);
    color: var(--text-main);
    font-size: 14px;
    line-height: 1.5;
}

/* Layout Utilities */
header {
    background-color: var(--bg-header);
    border-bottom: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 { font-size: 1.25rem; margin: 0; font-weight: bold; }
h2 { font-size: 1.1rem; margin: 0; font-weight: bold; }
h3 { font-size: 1rem; margin: 0; font-weight: bold; }

/* Buttons & Inputs */
button {
    cursor: pointer;
    padding: 4px 12px;
    border: 1px solid var(--border-color);
    background-color: var(--bg-panel);
    color: var(--text-main);
    font-family: inherit;
    font-size: 0.9rem;
}

button:hover { background-color: var(--border-color); }

button.primary {
    background-color: var(--accent-color);
    color: white;
    border-color: var(--accent-hover);
}
[data-theme="dark"] button.primary { color: #121212; }

button.primary:hover { opacity: 0.9; }

input[type="text"] {
    padding: 4px 8px;
    border: 1px solid var(--border-color);
    background-color: var(--bg-body);
    color: var(--text-main);
    min-width: 250px;
}

/* Breadcrumbs */
#breadcrumbs {
    padding: 0.5rem 1rem;
    background-color: var(--bg-body);
    border-bottom: 1px solid var(--border-color);
    font-size: 0.9rem;
}
.crumb { color: var(--accent-color); cursor: pointer; text-decoration: underline; }
.crumb:last-child { color: var(--text-main); text-decoration: none; cursor: default; }
.crumb-sep { margin: 0 5px; color: var(--text-muted); }

/* Main Content */
main { padding: 1rem; max-width: 100%; }

/* Panels / Containers */
.panel {
    border: 1px solid var(--border-color);
    background-color: var(--bg-panel);
    padding: 1rem;
    margin-bottom: 1rem;
}

.panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-color);
}

.controls { display: flex; gap: 5px; }

/* Data Tables */
.table-container { overflow-x: auto; width: 100%; }
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
th, td {
    border: 1px solid var(--border-color);
    padding: 6px 10px;
    text-align: left;
}
th {
    background-color: var(--bg-header);
    font-weight: 600;
    cursor: pointer;
}
th:hover { text-decoration: underline; }
tr:nth-child(even) { background-color: rgba(0,0,0,0.03); }
[data-theme="dark"] tr:nth-child(even) { background-color: rgba(255,255,255,0.03); }

/* Navigation Grid */
.nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
}
.nav-card {
    border: 1px solid var(--border-color);
    padding: 1rem;
    background-color: var(--bg-body);
    cursor: pointer;
}
.nav-card:hover {
    border-color: var(--accent-color);
    outline: 1px solid var(--accent-color);
}
.nav-card h3 { color: var(--accent-color); margin-bottom: 0.5rem; }
.nav-card p { color: var(--text-muted); margin: 0; font-size: 0.85rem; }

/* JSON Viewer */
pre.json-dump {
    background-color: var(--bg-header);
    padding: 10px;
    border: 1px solid var(--border-color);
    overflow: auto;
    font-family: monospace;
    font-size: 0.85rem;
}

/* Status Indicators */
.status-dot {
    height: 8px; width: 8px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 6px;
}
.status-green { background-color: var(--state-success); }
.status-red { background-color: var(--state-danger); }

/* Loader */
#loader {
    display: none;
    background-color: #ffd700;
    color: black;
    padding: 5px 10px;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    font-weight: bold;
    border: 1px solid #000;
    border-top: none;
    z-index: 999;
}

/* Utility to hide actor rows initially */
tr[id^="actor-row-"] { display: none; }

</style>
</head>
<body>

<div id="loader">LOADING DATA...</div>

<header>
    <div style="display:flex; align-items:center; gap:10px;">
        <div style="width:20px; height:20px; background-color: var(--accent-color);"></div>
        <h1>Luxon Server Monitor</h1>
    </div>
    <div style="display:flex; gap:10px;">
        <button onclick="toggleTheme()" id="theme-btn">Dark/Light</button>
        <button class="primary" onclick="app.refreshCurrentView()">Refresh</button>
    </div>
</header>

<div id="breadcrumbs">
    <span class="crumb" onclick="app.navigate('home')">Home</span>
</div>

<main id="content">
    </main>

<script>
/**
 * API SERVICE
 * Handles data fetching and error logic.
 */
const api = {
    baseUrl: window.location.origin, // Assumes served from same host
    // baseUrl: 'http://localhost:8080', // Uncomment for local testing if different port

    async get(endpoint) {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`${this.baseUrl}${endpoint}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                throw new Error(err.error || `Error ${res.status}`);
            }
            return await res.json();
        } catch (e) {
            console.error(e);
            alert(`API Error: ${e.message}`);
            return null;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
};

/**
 * STATE MANAGEMENT & ROUTING
 */
const app = {
    currentRoute: 'home',
    params: {},
    dataCache: null, // Stores current view data for filtering/saving

    init() {
        this.navigate('home');
    },

    navigate(route, params = {}) {
        this.currentRoute = route;
        this.params = params;
        this.render();
    },

    async refreshCurrentView() {
        this.render();
    },

    updateBreadcrumbs() {
        const bc = document.getElementById('breadcrumbs');
        let html = `<span class="crumb" onclick="app.navigate('home')">Home</span>`;

        if (this.currentRoute !== 'home') {
            html += ` <span class="crumb-sep">/</span> `;

            if (this.currentRoute === 'global_connections') {
                html += `<span class="crumb">Global Connections</span>`;
            }
            else if (this.currentRoute.startsWith('app_') || this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {

                // 1. App Dashboard Link
                html += `<span class="crumb" onclick="app.navigate('app_dashboard', {app_id: '${this.params.app_id}'})">App: ${this.params.app_id}</span>`;

                // 2. Specific Page Logic
                if (this.currentRoute === 'app_connections') {
                    html += ` <span class="crumb-sep">/</span> <span class="crumb">Connections</span>`;
                }
                else if (this.currentRoute === 'app_lobbies') {
                    html += ` <span class="crumb-sep">/</span> <span class="crumb">Lobbies</span>`;
                }
                else if (this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {
                    // Link back to Lobbies
                    html += ` <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate('app_lobbies', {app_id: '${this.params.app_id}'})">Lobbies</span>`;

                    // Link back to specific Lobby Game List
                    if (this.currentRoute === 'lobby_games') {
                         html += ` <span class="crumb-sep">/</span> <span class="crumb">Lobby ${this.params.lobby_idx}</span>`;
                    } else {
                         // If we are deep in Game Detail, this becomes a clickable link
                         html += ` <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate('lobby_games', {app_id: '${this.params.app_id}', lobby_idx: ${this.params.lobby_idx}})">Lobby ${this.params.lobby_idx}</span>`;
                         html += ` <span class="crumb-sep">/</span> <span class="crumb">Game: ${decodeURIComponent(this.params.game_id)}</span>`;
                    }
                }
            }
        }
        bc.innerHTML = html;
    },

    async render() {
        this.updateBreadcrumbs();
        const main = document.getElementById('content');
        main.innerHTML = ''; // Clear

        switch (this.currentRoute) {
            case 'home':
                this.renderHome(main);
                break;
            case 'global_connections':
                this.renderGlobalConnections(main);
                break;
            case 'app_dashboard':
                this.renderAppDashboard(main);
                break;
            case 'app_connections':
                this.renderAppConnections(main);
                break;
            case 'app_lobbies':
                this.renderAppLobbies(main);
                break;
            case 'lobby_games':
                this.renderLobbyGames(main);
                break;
            case 'game_detail':
                this.renderGameDetail(main);
                break;
        }
    },

    // --- VIEW RENDERERS ---

    async renderHome(container) {
        const apps = await api.get('/apps') || [];

        let appsHtml = apps.map(a => `
            <div class="nav-card" onclick="app.navigate('app_dashboard', {app_id: '${a.id}'})">
                <h3>${a.id}</h3>
                <p>Ver: ${a.version}</p>
                <p>${a.lobbies_count} Lobbies</p>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>Server Overview</h2>
                    <button onclick="app.navigate('global_connections')">View All Connections</button>
                </div>
                <div class="nav-grid">
                    ${appsHtml || '<p>No applications found.</p>'}
                </div>
            </div>
        `;
    },

    async renderGlobalConnections(container) {
        const data = await api.get('/connections') || [];
        this.dataCache = data;

        // Flatten data for table
        const tableData = data.map(c => ({
            Address: c.address,
            PeerID: c.peer_id,
            State: c.state === 5 ? 'Connected' : c.state,
            RTT: c.stats.rtt + 'ms',
            Loss: c.stats.packet_loss_crc + c.stats.packet_loss_challenge,
            User: c.auth?.user_id || '-',
            App: c.auth?.app_id || '-'
        }));

        this.renderTablePage(container, 'Global Connections', tableData, data);
    },

    async renderAppDashboard(container) {
        const appId = this.params.app_id;
        const details = await api.get(`/apps/${appId}`);

        if (!details) return;

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>App: ${details.id} <span style="font-weight:normal; font-size:0.9rem;">(v${details.version})</span></h2>
                </div>
                <div class="nav-grid">
                    <div class="nav-card" onclick="app.navigate('app_connections', {app_id: '${appId}'})">
                        <h3>Connections</h3>
                        <p>View authenticated sessions</p>
                    </div>
                    <div class="nav-card" onclick="app.navigate('app_lobbies', {app_id: '${appId}'})">
                        <h3>Lobbies (${details.lobbies_count})</h3>
                        <p>Browse lobbies & games</p>
                    </div>
                </div>
            </div>
        `;
    },

    async renderAppConnections(container) {
        const appId = this.params.app_id;
        const data = await api.get(`/apps/${appId}/connections`) || [];
        this.dataCache = data;

        const tableData = data.map(c => ({
            PeerID: c.peer_id,
            User: c.user_id,
            Address: c.address,
            RTT: c.stats.rtt + 'ms',
            Out: c.stats.bytes_out + ' B'
        }));

        this.renderTablePage(container, `${appId} - Connections`, tableData, data);
    },

    async renderAppLobbies(container) {
        const appId = this.params.app_id;
        const data = await api.get(`/apps/${appId}/lobbies`) || [];
        this.dataCache = data;

        const content = `
            <div class="panel">
                <div class="panel-header">
                    <h2>${appId} - Lobbies</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th onclick="ui.sortTable(0)">Index</th>
                                <th onclick="ui.sortTable(1)">Name</th>
                                <th onclick="ui.sortTable(2)">Type</th>
                                <th onclick="ui.sortTable(3)">Games</th>
                                <th onclick="ui.sortTable(4)">Peers</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(l => `
                                <tr>
                                    <td>${l.index}</td>
                                    <td>${l.name}</td>
                                    <td>${l.type}</td>
                                    <td>${l.games_count}</td>
                                    <td>${l.peer_count}</td>
                                    <td>
                                        <button onclick="app.navigate('lobby_games', {app_id: '${appId}', lobby_idx: ${l.index}})">
                                        View Games
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = content;
    },

async renderLobbyGames(container) {
        const { app_id, lobby_idx } = this.params;
        const data = await api.get(`/apps/${app_id}/lobbies/${lobby_idx}/games`) || [];
        this.dataCache = data;

        const content = `
            <div class="panel">
                <div class="panel-header">
                    <h2>Lobby ${lobby_idx} - Games</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th onclick="ui.sortTable(0)">ID</th>
                                <th onclick="ui.sortTable(1)">Players</th>
                                <th onclick="ui.sortTable(2)">Open</th>
                                <th onclick="ui.sortTable(3)">Visible</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(g => `
                                <tr>
                                    <td>${g.id}</td>
                                    <td>${g.player_count}/${g.max_players}</td>
                                    <td>${g.is_open ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No'}</td>
                                    <td>${g.is_visible ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No'}</td>
                                    <td>
                                        <button onclick="app.navigate('game_detail', {app_id: '${app_id}', lobby_idx: ${lobby_idx}, game_id: '${encodeURIComponent(g.id)}'})">
                                            Inspect
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = content;
    },

    async renderGameDetail(container) {
        const { app_id, lobby_idx, game_id } = this.params;

        const p1 = api.get(`/apps/${app_id}/lobbies/${lobby_idx}/games/${game_id}`);
        const p2 = api.get(`/apps/${app_id}/lobbies/${lobby_idx}/games/${game_id}/actors`);

        const [game, actors] = await Promise.all([p1, p2]);
        if (!game) return;

        const masterActor = actors ? actors.find(a => a.actor_id === game.master_client_id) : null;
        const masterName = masterActor ? `${masterActor.user_id} (ID: ${game.master_client_id})` : game.master_client_id;

        container.innerHTML = `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem;">
                <div class="panel">
                    <div class="panel-header"><h2>Game: ${game.id}</h2></div>
                    <table style="margin-bottom:1rem;">
                        <tr><td style="border:none; padding-left:0;"><strong>Master Client:</strong></td><td style="border:none;">${masterName}</td></tr>
                        <tr><td style="border:none; padding-left:0;"><strong>Player TTL:</strong></td><td style="border:none;">${game.player_ttl}ms</td></tr>
                        <tr><td style="border:none; padding-left:0;"><strong>Empty TTL:</strong></td><td style="border:none;">${game.empty_room_ttl}ms</td></tr>
                        <tr><td style="border:none; padding-left:0;"><strong>Flags:</strong></td><td style="border:none;">${game.flags}</td></tr>
                    </table>

                    <h3 style="margin-top:1rem; border-bottom:1px solid var(--border-color);">Properties</h3>
                    <pre class="json-dump">${JSON.stringify(game.full_props, null, 2)}</pre>
                </div>

                <div class="panel">
                    <div class="panel-header"><h2>Actors (${actors ? actors.length : 0})</h2></div>
                    <div class="table-container" style="max-height: 400px; overflow-y:auto;">
                        <table style="width:100%;">
                            <thead>
                                <th style="position:sticky; top:0;">ID</th>
                                <th style="position:sticky; top:0;">User</th>
                                <th style="position:sticky; top:0;">Action</th>
                            </thead>
                            <tbody>
                                ${actors ? actors.map(a => `
                                    <tr>
                                        <td>${a.actor_id}</td>
                                        <td>${a.user_id}</td>
                                        <td>
                                            <button onclick="ui.loadActorDetail(this, '${app_id}', ${lobby_idx}, '${game_id}', ${a.actor_id})">
                                                Detail
                                            </button>
                                        </td>
                                    </tr>
                                    <tr id="actor-row-${a.actor_id}">
                                        <td colspan="3" style="padding:0;">
                                            <div id="actor-detail-${a.actor_id}" style="padding:10px; border-bottom:1px solid var(--border-color); background: rgba(0,0,0,0.02);">Loading...</div>
                                        </td>
                                    </tr>
                                `).join('') : '<tr><td colspan="3">No actors</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    },

    renderTablePage(container, title, flattenedData, rawData) {
        if (!flattenedData.length) {
            container.innerHTML = `
                <div class="panel">
                    <div class="panel-header"><h2>${title}</h2></div>
                    <p>No data available.</p>
                </div>`;
            return;
        }

        const headers = Object.keys(flattenedData[0]);

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>${title}</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                ${headers.map((h, i) => `<th onclick="ui.sortTable(${i})">${h}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${flattenedData.map(row => `
                                <tr>
                                    ${Object.values(row).map(val => `<td>${val}</td>`).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div style="margin-top:0.5rem; font-size:0.8rem; color:var(--text-muted);">
                    Total: ${flattenedData.length} entries
                </div>
            </div>
        `;
    }
};

/**
 * UI UTILITIES
 */
const ui = {
    sortAsc: true,

    sortTable(colIndex) {
        const table = document.getElementById("dataTable");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));

        // Exclude detail rows if they exist
        const dataRows = rows.filter(r => !r.id || !r.id.startsWith('actor-row'));

        this.sortAsc = !this.sortAsc;

        dataRows.sort((a, b) => {
            const valA = a.cells[colIndex].innerText.toLowerCase();
            const valB = b.cells[colIndex].innerText.toLowerCase();
            const numA = parseFloat(valA);
            const numB = parseFloat(valB);

            if (!isNaN(numA) && !isNaN(numB)) {
                return this.sortAsc ? numA - numB : numB - numA;
            }
            return this.sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });

        // If there are detail rows, this sort will break the association, but for this simplified view, it's acceptable.
        // A full fix would require grouping trs. For now, we append sorted rows.
        tbody.append(...dataRows);
    },

    filterTable() {
        const input = document.getElementById("filterInput");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("dataTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            if (tr[i].id && tr[i].id.startsWith('actor-row')) continue;
            let visible = false;
            const tds = tr[i].getElementsByTagName("td");
            for (let j = 0; j < tds.length; j++) {
                if (tds[j] && tds[j].innerText.toLowerCase().indexOf(filter) > -1) {
                    visible = true;
                    break;
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    },

    downloadJSON() {
        if (!app.dataCache) {
            alert("No data to save.");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(app.dataCache, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `export_${Date.now()}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    },

    async loadActorDetail(btn, appId, lobbyIdx, gameId, actorId) {
        const rowId = `actor-row-${actorId}`;
        const divId = `actor-detail-${actorId}`;
        const row = document.getElementById(rowId);

        if (row.style.display === 'table-row') {
            row.style.display = 'none';
            btn.innerText = 'Detail';
            return;
        }

        row.style.display = 'table-row';
        btn.innerText = 'Close';

        const data = await api.get(`/apps/${appId}/lobbies/${lobbyIdx}/games/${gameId}/actors/${actorId}`);
        const container = document.getElementById(divId);

        if (!data) {
            container.innerHTML = "Error loading data.";
            return;
        }

        container.innerHTML = `
            <div style="display:flex; flex-wrap:wrap; gap:2rem;">
                <div style="flex:1;">
                    <strong>Properties:</strong>
                    <pre class="json-dump" style="margin-top:5px;">${JSON.stringify(data.props, null, 2)}</pre>
                </div>
                <div style="flex:1;">
                    <strong>Connection:</strong>
                    <ul style="padding-left:1.2rem; margin-top:5px;">
                        <li>Peer ID: ${data.connection_info.peer_id}</li>
                        <li>RTT: ${data.connection_info.rtt}ms</li>
                    </ul>
                    <strong>Groups:</strong> [${data.interest_groups.join(', ')}]
                </div>
            </div>
        `;
    }
};

// Theme Toggler
function toggleTheme() {
    const body = document.body;
    if (body.getAttribute('data-theme') === 'dark') {
        body.removeAttribute('data-theme');
        localStorage.setItem('theme', 'light');
    } else {
        body.setAttribute('data-theme', 'dark');
        localStorage.setItem('theme', 'dark');
    }
}

// Init Theme
if (localStorage.getItem('theme') === 'dark') {
    toggleTheme();
}

// Initialize App
app.init();

</script>
</body>
</html>
