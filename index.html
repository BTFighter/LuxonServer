<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxon Server Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* Page Specific Overrides */
input[type="text"] {
    min-width: 250px;
}

/* Breadcrumbs */
#breadcrumbs {
    padding: 0.8rem 2rem;
    background-color: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.9rem;
}
.crumb {
    color: var(--brand-green);
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px dashed transparent;
}
.crumb:hover { border-bottom-color: var(--brand-green); }
.crumb:last-child { color: var(--text-main); cursor: default; border: none; }
.crumb-sep { margin: 0 8px; color: var(--text-muted); }

/* Data Tables */
.table-container { overflow-x: auto; width: 100%; }
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
th, td {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 14px;
    text-align: left;
}
th {
    background-color: rgba(0,0,0,0.2);
    font-weight: 600;
    color: var(--brand-green);
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
}
th:hover { background-color: rgba(191, 255, 0, 0.05); }
tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
tr:hover { background-color: rgba(255,255,255,0.04); }

/* Navigation Grid */
.nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
}
.nav-card {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 1.5rem;
    background-color: var(--input-bg);
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s, border-color 0.2s;
}
.nav-card:hover {
    border-color: var(--brand-green);
    transform: translateY(-2px);
}
.nav-card h3 { margin-bottom: 0.5rem; }
.nav-card p { color: var(--text-muted); margin: 0; font-size: 0.85rem; }

/* JSON Viewer */
pre.json-dump {
    background-color: var(--input-bg);
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    overflow: auto;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: #e6edf3;
}

/* Loader */
#loader {
    display: none;
    background-color: var(--brand-green);
    color: var(--brand-navy-dark);
    padding: 8px 16px;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 800;
    border-radius: 0 0 8px 8px;
    z-index: 999;
    box-shadow: 0 0 20px var(--brand-green);
}

/* Utility to hide actor rows initially */
tr[id^="actor-row-"] { display: none; }
</style>
</head>
<body>

<div id="loader">LOADING DATA...</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div style="width:24px; height:24px; background-color: var(--brand-green); border-radius: 2px; box-shadow: 0 0 10px var(--brand-green);"></div>
        <h1>Luxon <span>Server Monitor</span></h1>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="primary" onclick="app.refreshCurrentView()">Refresh</button>
    </div>
</header>

<div id="breadcrumbs">
    <span class="crumb" onclick="app.navigate('home')">Home</span>
</div>

<main id="content">
    </main>

<script>
function safeSingleQuoteStringify(str) {
  return JSON.stringify(str)
    .replace(/'/g, "\\'")
    .replace(/\\"/g, '"')
    .replace(/^"|"$/g, "'");
}

/**
 * API SERVICE
 */
const api = {
    baseUrl: window.location.origin,
    // baseUrl: 'http://localhost:8080',

    async get(endpoint) {
        document.getElementById('loader').style.display = 'block';
        try {
            const res = await fetch(`${this.baseUrl}${endpoint}`);
            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: res.statusText }));
                throw new Error(err.error || `Error ${res.status}`);
            }
            return await res.json();
        } catch (e) {
            console.error(e);
            alert(`API Error: ${e.message}`);
            return null;
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }
};

/**
 * STATE MANAGEMENT & ROUTING
 */
const app = {
    currentRoute: 'home',
    params: {},
    dataCache: null,

    init() {
        this.navigate('home');
    },

    navigate(route, params = {}) {
        this.currentRoute = route;
        this.params = params;
        this.render();
    },

    async refreshCurrentView() {
        this.render();
    },

    updateBreadcrumbs() {
        const bc = document.getElementById('breadcrumbs');
        let html = `<span class="crumb" onclick="app.navigate('home')">Home</span>`;

        if (this.currentRoute !== 'home') {
            html += ` <span class="crumb-sep">/</span> `;

            if (this.currentRoute === 'global_connections') {
                html += `<span class="crumb">Global Connections</span>`;
            }
            else if (this.currentRoute.startsWith('app_') || this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {
                html += `<span class="crumb" onclick="app.navigate('app_dashboard', {app_id: '${this.params.app_id}'})">App: ${this.params.app_id}</span>`;

                if (this.currentRoute === 'app_connections') {
                    html += ` <span class="crumb-sep">/</span> <span class="crumb">Connections</span>`;
                }
                else if (this.currentRoute === 'app_lobbies') {
                    html += ` <span class="crumb-sep">/</span> <span class="crumb">Lobbies</span>`;
                }
                else if (this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {
                    html += ` <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate('app_lobbies', {app_id: '${this.params.app_id}'})">Lobbies</span>`;

                    if (this.currentRoute === 'lobby_games') {
                         html += ` <span class="crumb-sep">/</span> <span class="crumb">Lobby ${this.params.lobby_name}</span>`;
                    } else {
                         html += ` <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate('lobby_games', {app_id: '${this.params.app_id}', lobby_name: ${safeSingleQuoteStringify(this.params.lobby_name)}})">Lobby ${this.params.lobby_name}</span>`;
                         html += ` <span class="crumb-sep">/</span> <span class="crumb">Game: ${decodeURIComponent(this.params.game_id)}</span>`;
                    }
                }
            }
        }
        bc.innerHTML = html;
    },

    async render() {
        this.updateBreadcrumbs();
        const main = document.getElementById('content');
        main.innerHTML = '';

        switch (this.currentRoute) {
            case 'home': this.renderHome(main); break;
            case 'global_connections': this.renderGlobalConnections(main); break;
            case 'app_dashboard': this.renderAppDashboard(main); break;
            case 'app_connections': this.renderAppConnections(main); break;
            case 'app_lobbies': this.renderAppLobbies(main); break;
            case 'lobby_games': this.renderLobbyGames(main); break;
            case 'game_detail': this.renderGameDetail(main); break;
        }
    },

    // --- VIEW RENDERERS ---

    async renderHome(container) {
        const apps = await api.get('/apps') || [];
        let appsHtml = apps.map(a => `
            <div class="nav-card" onclick="app.navigate('app_dashboard', {app_id: '${a.id}'})">
                <h3>${a.id}</h3>
                <p>Ver: ${a.version}</p>
                <p>${a.lobbies_count} Lobbies</p>
            </div>
        `).join('');

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>Server Overview</h2>
                    <button onclick="app.navigate('global_connections')">View All Connections</button>
                </div>
                <div class="nav-grid">
                    ${appsHtml || '<p style="color:var(--text-muted)">No applications found.</p>'}
                </div>
            </div>
        `;
    },

    async renderGlobalConnections(container) {
        const data = await api.get('/connections') || [];
        this.dataCache = data;
        const tableData = data.map(c => ({
            Address: c.address,
            PeerID: c.peer_id,
            State: c.state === 5 ? 'Connected' : c.state,
            RTT: c.stats.rtt + 'ms',
            Loss: c.stats.packet_loss_crc + c.stats.packet_loss_challenge,
            User: c.auth?.user_id || '-',
            App: c.auth?.app_id || '-'
        }));
        this.renderTablePage(container, 'Global Connections', tableData, data);
    },

    async renderAppDashboard(container) {
        const appId = this.params.app_id;
        const details = await api.get(`/apps/${appId}`);
        if (!details) return;

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>App: ${details.id} <span style="font-weight:normal; font-size:0.9rem; color:var(--text-muted);">(v${details.version})</span></h2>
                </div>
                <div class="nav-grid">
                    <div class="nav-card" onclick="app.navigate('app_connections', {app_id: '${appId}'})">
                        <h3>Connections</h3>
                        <p>View authenticated sessions</p>
                    </div>
                    <div class="nav-card" onclick="app.navigate('app_lobbies', {app_id: '${appId}'})">
                        <h3>Lobbies (${details.lobbies_count})</h3>
                        <p>Browse lobbies & games</p>
                    </div>
                </div>
            </div>
        `;
    },

    async renderAppConnections(container) {
        const appId = this.params.app_id;
        const data = await api.get(`/apps/${appId}/connections`) || [];
        this.dataCache = data;
        const tableData = data.map(c => ({
            PeerID: c.peer_id,
            User: c.user_id,
            Address: c.address,
            RTT: c.stats.rtt + 'ms',
            Out: c.stats.bytes_out + ' B'
        }));
        this.renderTablePage(container, `${appId} - Connections`, tableData, data);
    },

    async renderAppLobbies(container) {
        const appId = this.params.app_id;
        const data = await api.get(`/apps/${appId}/lobbies`) || [];
        this.dataCache = data;

        const content = `
            <div class="panel">
                <div class="panel-header">
                    <h2>${appId} - Lobbies</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th onclick="ui.sortTable(0)">Name</th>
                                <th onclick="ui.sortTable(1)">Type</th>
                                <th onclick="ui.sortTable(2)">Games</th>
                                <th onclick="ui.sortTable(3)">Peers</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(l => `
                                <tr>
                                    <td>${l.name}</td>
                                    <td>${l.type}</td>
                                    <td>${l.games_count}</td>
                                    <td>${l.peer_count}</td>
                                    <td>
                                        <button onclick="app.navigate('lobby_games', {app_id: '${appId}', lobby_name: ${safeSingleQuoteStringify(l.name)}})">
                                        View Games
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = content;
    },

async renderLobbyGames(container) {
        const { app_id, lobby_name } = this.params;
        const data = await api.get(`/apps/${app_id}/lobbies/${lobby_name}/games`) || [];
        this.dataCache = data;

        const content = `
            <div class="panel">
                <div class="panel-header">
                    <h2>Lobby ${lobby_name} - Games</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                <th onclick="ui.sortTable(0)">ID</th>
                                <th onclick="ui.sortTable(1)">Players</th>
                                <th onclick="ui.sortTable(2)">Open</th>
                                <th onclick="ui.sortTable(3)">Visible</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${data.map(g => `
                                <tr>
                                    <td>${g.id}</td>
                                    <td>${g.player_count}/${g.max_players}</td>
                                    <td>${g.is_open ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No'}</td>
                                    <td>${g.is_visible ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No'}</td>
                                    <td>
                                        <button onclick="app.navigate('game_detail', {app_id: '${app_id}', lobby_name: ${safeSingleQuoteStringify(lobby_name)}, game_id: '${encodeURIComponent(g.id)}'})">
                                            Inspect
                                        </button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            </div>
        `;
        container.innerHTML = content;
    },

    async renderGameDetail(container) {
        const { app_id, lobby_name, game_id } = this.params;
        const p1 = api.get(`/apps/${app_id}/lobbies/${lobby_name}/games/${game_id}`);
        const p2 = api.get(`/apps/${app_id}/lobbies/${lobby_name}/games/${game_id}/actors`);
        const [game, actors] = await Promise.all([p1, p2]);
        if (!game) return;

        const masterActor = actors ? actors.find(a => a.actor_id === game.master_client_id) : null;
        const masterName = masterActor ? `${masterActor.user_id} (ID: ${game.master_client_id})` : game.master_client_id;

        container.innerHTML = `
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">
                <div class="panel">
                    <div class="panel-header"><h2>Game: ${game.id}</h2></div>
                    <table style="margin-bottom:1rem; background:transparent;">
                        <tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Master Client:</strong></td><td style="border:none;">${masterName}</td></tr>
                        <tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Player TTL:</strong></td><td style="border:none;">${game.player_ttl}ms</td></tr>
                        <tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Empty TTL:</strong></td><td style="border:none;">${game.empty_room_ttl}ms</td></tr>
                        <tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Flags:</strong></td><td style="border:none;">${game.flags}</td></tr>
                    </table>

                    <h3 style="margin-top:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border-color);">Properties</h3>
                    <pre class="json-dump" style="margin-top:10px;">${safeSingleQuoteStringify(game.full_props, null, 2)}</pre>
                </div>

                <div class="panel">
                    <div class="panel-header"><h2>Actors (${actors ? actors.length : 0})</h2></div>
                    <div class="table-container" style="overflow-y:auto;">
                        <table style="width:100%;">
                            <thead>
                                <th style="position:sticky; top:0; background-color:#0d1117;">ID</th>
                                <th style="position:sticky; top:0; background-color:#0d1117;">User</th>
                                <th style="position:sticky; top:0; background-color:#0d1117;">Action</th>
                            </thead>
                            <tbody>
                                ${actors ? actors.map(a => `
                                    <tr>
                                        <td>${a.actor_id}</td>
                                        <td>${a.user_id}</td>
                                        <td>
                                            <button onclick="ui.loadActorDetail(this, '${app_id}', ${safeSingleQuoteStringify(lobby_name)}, '${game_id}', ${a.actor_id})">
                                                Detail
                                            </button>
                                        </td>
                                    </tr>
                                    <tr id="actor-row-${a.actor_id}">
                                        <td colspan="3" style="padding:0; border:none;">
                                            <div id="actor-detail-${a.actor_id}" style="padding:15px; border-bottom:1px solid var(--border-color); background: rgba(0,0,0,0.3); border-left: 2px solid var(--brand-green);">Loading...</div>
                                        </td>
                                    </tr>
                                `).join('') : '<tr><td colspan="3">No actors</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;
    },

    renderTablePage(container, title, flattenedData, rawData) {
        if (!flattenedData.length) {
            container.innerHTML = `
                <div class="panel">
                    <div class="panel-header"><h2>${title}</h2></div>
                    <p style="color:var(--text-muted)">No data available.</p>
                </div>`;
            return;
        }

        const headers = Object.keys(flattenedData[0]);

        container.innerHTML = `
            <div class="panel">
                <div class="panel-header">
                    <h2>${title}</h2>
                    <div class="controls">
                        <input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">
                        <button onclick="ui.downloadJSON()">Save JSON</button>
                    </div>
                </div>
                <div class="table-container">
                    <table id="dataTable">
                        <thead>
                            <tr>
                                ${headers.map((h, i) => `<th onclick="ui.sortTable(${i})">${h}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${flattenedData.map(row => `
                                <tr>
                                    ${Object.values(row).map(val => `<td>${val}</td>`).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
                <div style="margin-top:0.5rem; font-size:0.8rem; color:var(--text-muted);">
                    Total: ${flattenedData.length} entries
                </div>
            </div>
        `;
    }
};

/**
 * UI UTILITIES
 */
const ui = {
    sortAsc: true,
    sortTable(colIndex) {
        const table = document.getElementById("dataTable");
        const tbody = table.querySelector("tbody");
        const rows = Array.from(tbody.querySelectorAll("tr"));
        const dataRows = rows.filter(r => !r.id || !r.id.startsWith('actor-row'));

        this.sortAsc = !this.sortAsc;

        dataRows.sort((a, b) => {
            const valA = a.cells[colIndex].innerText.toLowerCase();
            const valB = b.cells[colIndex].innerText.toLowerCase();
            const numA = parseFloat(valA);
            const numB = parseFloat(valB);

            if (!isNaN(numA) && !isNaN(numB)) {
                return this.sortAsc ? numA - numB : numB - numA;
            }
            return this.sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
        });
        tbody.append(...dataRows);
    },

    filterTable() {
        const input = document.getElementById("filterInput");
        const filter = input.value.toLowerCase();
        const table = document.getElementById("dataTable");
        const tr = table.getElementsByTagName("tr");

        for (let i = 1; i < tr.length; i++) {
            if (tr[i].id && tr[i].id.startsWith('actor-row')) continue;
            let visible = false;
            const tds = tr[i].getElementsByTagName("td");
            for (let j = 0; j < tds.length; j++) {
                if (tds[j] && tds[j].innerText.toLowerCase().indexOf(filter) > -1) {
                    visible = true;
                    break;
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    },

    downloadJSON() {
        if (!app.dataCache) {
            alert("No data to save.");
            return;
        }
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(safeSingleQuoteStringify(app.dataCache, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", `export_${Date.now()}.json`);
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
    },

    async loadActorDetail(btn, appId, lobbyIdx, gameId, actorId) {
        const rowId = `actor-row-${actorId}`;
        const divId = `actor-detail-${actorId}`;
        const row = document.getElementById(rowId);

        if (row.style.display === 'table-row') {
            row.style.display = 'none';
            btn.innerText = 'Detail';
            return;
        }

        row.style.display = 'table-row';
        btn.innerText = 'Close';

        const data = await api.get(`/apps/${appId}/lobbies/${lobbyIdx}/games/${gameId}/actors/${actorId}`);
        const container = document.getElementById(divId);

        if (!data) {
            container.innerHTML = "Error loading data.";
            return;
        }

        container.innerHTML = `
            <div style="display:flex; flex-wrap:wrap; gap:2rem;">
                <div style="flex:1;">
                    <strong style="color:var(--brand-green);">Properties:</strong>
                    <pre class="json-dump" style="margin-top:5px;">${safeSingleQuoteStringify(data.props, null, 2)}</pre>
                </div>
                <div style="flex:1;">
                    <strong style="color:var(--brand-green);">Connection:</strong>
                    <ul style="padding-left:1.2rem; margin-top:5px;">
                        <li>Peer ID: ${data.connection_info.peer_id}</li>
                        <li>RTT: ${data.connection_info.rtt}ms</li>
                    </ul>
                    <strong style="color:var(--brand-green);">Groups:</strong> [${data.interest_groups.join(', ')}]
                </div>
            </div>
        `;
    }
};

// App Init
app.init();

</script>
</body>
</html>
