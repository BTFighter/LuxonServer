<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxon Server Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* Page Specific Overrides */
input[type="text"] {
    min-width: 250px;
}

/* Breadcrumbs */
#breadcrumbs {
    padding: 0.8rem 2rem;
    background-color: rgba(0,0,0,0.2);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    font-size: 0.9rem;
}
.crumb {
    color: var(--brand-green);
    cursor: pointer;
    text-decoration: none;
    border-bottom: 1px dashed transparent;
}
.crumb:hover { border-bottom-color: var(--brand-green); }
.crumb:last-child { color: var(--text-main); cursor: default; border: none; }
.crumb-sep { margin: 0 8px; color: var(--text-muted); }

/* Data Tables */
.table-container { overflow-x: auto; width: 100%; }
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
}
th, td {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 10px 14px;
    text-align: left;
}
th {
    background-color: rgba(0,0,0,0.2);
    font-weight: 600;
    color: var(--brand-green);
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.8rem;
    letter-spacing: 0.5px;
}
th:hover { background-color: rgba(191, 255, 0, 0.05); }
tr:nth-child(even) { background-color: rgba(255,255,255,0.02); }
tr:hover { background-color: rgba(255,255,255,0.04); }

/* Navigation Grid */
.nav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.5rem;
}
.nav-card {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 1.5rem;
    background-color: var(--input-bg);
    cursor: pointer;
    border-radius: 8px;
    transition: transform 0.2s, border-color 0.2s;
}
.nav-card:hover {
    border-color: var(--brand-green);
    transform: translateY(-2px);
}
.nav-card h3 { margin-bottom: 0.5rem; }
.nav-card p { color: var(--text-muted); margin: 0; font-size: 0.85rem; }

/* JSON Viewer */
pre.json-dump {
    background-color: var(--input-bg);
    padding: 15px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    overflow: auto;
    font-family: var(--font-mono);
    font-size: 0.85rem;
    color: #e6edf3;
}

/* Loader */
#loader {
    display: none;
    background-color: var(--brand-green);
    color: var(--brand-navy-dark);
    padding: 8px 16px;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    font-weight: 800;
    border-radius: 0 0 8px 8px;
    z-index: 999;
    box-shadow: 0 0 20px var(--brand-green);
}

/* Utility to hide actor rows initially */
tr[id^="actor-row-"] { display: none; }
</style>
</head>
<body>

<div id="loader">LOADING DATA...</div>

<header>
    <div style="display:flex; align-items:center; gap:15px;">
        <div style="width:24px; height:24px; background-color: var(--brand-green); border-radius: 2px; box-shadow: 0 0 10px var(--brand-green);"></div>
        <h1>Luxon <span>Server Monitor</span></h1>
    </div>
    <div style="display:flex; gap:10px;">
        <button class="primary" onclick="app.refreshCurrentView()">Refresh</button>
    </div>
</header>

<div id="breadcrumbs">
    <span class="crumb" onclick="app.navigate('home')">Home</span>
</div>

<main id="content">
    </main>

<script>
function safeSingleQuoteStringify(str) {
    if (!str) return '""';
    return JSON.stringify(str)
        .replace(/'/g, "\\'")
        .replace(/\\"/g, '"')
        .replace(/^"|"$/g, "'");
}

// Fallback for window.location.origin in older browsers like IE10
var getOrigin = function() {
    if (!window.location.origin) {
        return window.location.protocol + "//" + window.location.hostname + (window.location.port ? ':' + window.location.port: '');
    }
    return window.location.origin;
};

/**
 * API SERVICE
 */
var api = {
    baseUrl: getOrigin(),

    get: function(endpoint, callback) {
        document.getElementById('loader').style.display = 'block';
        var xhr = new XMLHttpRequest();
        xhr.open('GET', this.baseUrl + endpoint, true);

        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4) {
                document.getElementById('loader').style.display = 'none';
                if (xhr.status >= 200 && xhr.status < 300) {
                    try {
                        var data = JSON.parse(xhr.responseText);
                        callback(null, data);
                    } catch (e) {
                        console.error(e);
                        callback(e, null);
                    }
                } else {
                    var errObj;
                    try {
                        errObj = JSON.parse(xhr.responseText);
                    } catch (e) {
                        errObj = { error: "Error " + xhr.status };
                    }
                    var errMsg = errObj.error || ("Error " + xhr.status);
                    alert("API Error: " + errMsg);
                    callback(new Error(errMsg), null);
                }
            }
        };
        xhr.send();
    }
};

/**
 * STATE MANAGEMENT & ROUTING
 */
var app = {
    currentRoute: 'home',
    params: {},
    dataCache: null,

    init: function() {
        this.navigate('home');
    },

    navigate: function(route, params) {
        this.currentRoute = route;
        this.params = params || {};
        this.render();
    },

    refreshCurrentView: function() {
        this.render();
    },

    updateBreadcrumbs: function() {
        var bc = document.getElementById('breadcrumbs');
        var html = '<span class="crumb" onclick="app.navigate(\'home\')">Home</span>';

        if (this.currentRoute !== 'home') {
            html += ' <span class="crumb-sep">/</span> ';

            if (this.currentRoute === 'global_connections') {
                html += '<span class="crumb">Global Connections</span>';
            }
            else if (this.currentRoute.indexOf('app_') === 0 || this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {
                html += '<span class="crumb" onclick="app.navigate(\'app_dashboard\', {app_id: \'' + this.params.app_id + '\'})">App: ' + this.params.app_id + '</span>';

                if (this.currentRoute === 'app_connections') {
                    html += ' <span class="crumb-sep">/</span> <span class="crumb">Connections</span>';
                }
                else if (this.currentRoute === 'app_lobbies') {
                    html += ' <span class="crumb-sep">/</span> <span class="crumb">Lobbies</span>';
                }
                else if (this.currentRoute === 'lobby_games' || this.currentRoute === 'game_detail') {
                    html += ' <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate(\'app_lobbies\', {app_id: \'' + this.params.app_id + '\'})">Lobbies</span>';

                    if (this.currentRoute === 'lobby_games') {
                         html += ' <span class="crumb-sep">/</span> <span class="crumb">Lobby ' + this.params.lobby_name + '</span>';
                    } else {
                         html += ' <span class="crumb-sep">/</span> <span class="crumb" onclick="app.navigate(\'lobby_games\', {app_id: \'' + this.params.app_id + '\', lobby_name: ' + safeSingleQuoteStringify(this.params.lobby_name) + '})">Lobby ' + this.params.lobby_name + '</span>';
                         html += ' <span class="crumb-sep">/</span> <span class="crumb">Game: ' + decodeURIComponent(this.params.game_id) + '</span>';
                    }
                }
            }
        }
        bc.innerHTML = html;
    },

    render: function() {
        this.updateBreadcrumbs();
        var main = document.getElementById('content');
        main.innerHTML = '';

        switch (this.currentRoute) {
            case 'home': this.renderHome(main); break;
            case 'global_connections': this.renderGlobalConnections(main); break;
            case 'app_dashboard': this.renderAppDashboard(main); break;
            case 'app_connections': this.renderAppConnections(main); break;
            case 'app_lobbies': this.renderAppLobbies(main); break;
            case 'lobby_games': this.renderLobbyGames(main); break;
            case 'game_detail': this.renderGameDetail(main); break;
        }
    },

    // --- VIEW RENDERERS ---

    renderHome: function(container) {
        api.get('/apps', function(err, apps) {
            apps = apps || [];
            var appsHtml = "";
            for (var i = 0; i < apps.length; i++) {
                var a = apps[i];
                appsHtml += '<div class="nav-card" onclick="app.navigate(\'app_dashboard\', {app_id: \'' + a.id + '\'})">' +
                            '<h3>' + a.id + '</h3>' +
                            '<p>Ver: ' + a.version + '</p>' +
                            '<p>' + a.lobbies_count + ' Lobbies</p>' +
                            '</div>';
            }

            container.innerHTML = '<div class="panel">' +
                '<div class="panel-header">' +
                    '<h2>Server Overview</h2>' +
                    '<button onclick="app.navigate(\'global_connections\')">View All Connections</button>' +
                '</div>' +
                '<div class="nav-grid">' +
                    (appsHtml || '<p style="color:var(--text-muted)">No applications found.</p>') +
                '</div>' +
            '</div>';
        });
    },

    renderGlobalConnections: function(container) {
        var self = this;
        api.get('/connections', function(err, data) {
            data = data || [];
            self.dataCache = data;

            var tableData = [];
            for (var i = 0; i < data.length; i++) {
                var c = data[i];
                tableData.push({
                    Address: c.address,
                    PeerID: c.peer_id,
                    State: c.state === 5 ? 'Connected' : c.state,
                    RTT: c.stats.rtt + 'ms',
                    Loss: c.stats.packet_loss_crc + c.stats.packet_loss_challenge,
                    User: (c.auth && c.auth.user_id) ? c.auth.user_id : '-',
                    App: (c.auth && c.auth.app_id) ? c.auth.app_id : '-'
                });
            }
            self.renderTablePage(container, 'Global Connections', tableData, data);
        });
    },

    renderAppDashboard: function(container) {
        var appId = this.params.app_id;
        api.get('/apps/' + appId, function(err, details) {
            if (!details) return;

            container.innerHTML = '<div class="panel">' +
                '<div class="panel-header">' +
                    '<h2>App: ' + details.id + ' <span style="font-weight:normal; font-size:0.9rem; color:var(--text-muted);">(v' + details.version + ')</span></h2>' +
                '</div>' +
                '<div class="nav-grid">' +
                    '<div class="nav-card" onclick="app.navigate(\'app_connections\', {app_id: \'' + appId + '\'})">' +
                        '<h3>Connections</h3>' +
                        '<p>View authenticated sessions</p>' +
                    '</div>' +
                    '<div class="nav-card" onclick="app.navigate(\'app_lobbies\', {app_id: \'' + appId + '\'})">' +
                        '<h3>Lobbies (' + details.lobbies_count + ')</h3>' +
                        '<p>Browse lobbies & games</p>' +
                    '</div>' +
                '</div>' +
            '</div>';
        });
    },

    renderAppConnections: function(container) {
        var self = this;
        var appId = this.params.app_id;
        api.get('/apps/' + appId + '/connections', function(err, data) {
            data = data || [];
            self.dataCache = data;

            var tableData = [];
            for (var i = 0; i < data.length; i++) {
                var c = data[i];
                tableData.push({
                    PeerID: c.peer_id,
                    User: c.user_id,
                    Address: c.address,
                    RTT: c.stats.rtt + 'ms',
                    Out: c.stats.bytes_out + ' B'
                });
            }
            self.renderTablePage(container, appId + ' - Connections', tableData, data);
        });
    },

    renderAppLobbies: function(container) {
        var self = this;
        var appId = this.params.app_id;
        api.get('/apps/' + appId + '/lobbies', function(err, data) {
            data = data || [];
            self.dataCache = data;

            var rows = "";
            for (var i = 0; i < data.length; i++) {
                var l = data[i];
                rows += '<tr>' +
                            '<td>' + l.name + '</td>' +
                            '<td>' + l.type + '</td>' +
                            '<td>' + l.games_count + '</td>' +
                            '<td>' + l.peer_count + '</td>' +
                            '<td>' +
                                '<button onclick="app.navigate(\'lobby_games\', {app_id: \'' + appId + '\', lobby_name: ' + safeSingleQuoteStringify(l.name) + '})">View Games</button>' +
                            '</td>' +
                        '</tr>';
            }

            container.innerHTML = '<div class="panel">' +
                '<div class="panel-header">' +
                    '<h2>' + appId + ' - Lobbies</h2>' +
                    '<div class="controls">' +
                        '<input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">' +
                        '<button onclick="ui.downloadJSON()">Save JSON</button>' +
                    '</div>' +
                '</div>' +
                '<div class="table-container">' +
                    '<table id="dataTable">' +
                        '<thead>' +
                            '<tr>' +
                                '<th onclick="ui.sortTable(0)">Name</th>' +
                                '<th onclick="ui.sortTable(1)">Type</th>' +
                                '<th onclick="ui.sortTable(2)">Games</th>' +
                                '<th onclick="ui.sortTable(3)">Peers</th>' +
                                '<th>Action</th>' +
                            '</tr>' +
                        '</thead>' +
                        '<tbody>' + rows + '</tbody>' +
                    '</table>' +
                '</div>' +
            '</div>';
        });
    },

    renderLobbyGames: function(container) {
        var self = this;
        var appId = this.params.app_id;
        var lobbyName = this.params.lobby_name;

        api.get('/apps/' + appId + '/lobbies/' + lobbyName + '/games', function(err, data) {
            data = data || [];
            self.dataCache = data;

            var rows = "";
            for (var i = 0; i < data.length; i++) {
                var g = data[i];
                var openHtml = g.is_open ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No';
                var visibleHtml = g.is_visible ? '<span class="status-dot status-green"></span>Yes' : '<span class="status-dot status-red"></span>No';

                rows += '<tr>' +
                            '<td>' + g.id + '</td>' +
                            '<td>' + g.player_count + '/' + g.max_players + '</td>' +
                            '<td>' + openHtml + '</td>' +
                            '<td>' + visibleHtml + '</td>' +
                            '<td>' +
                                '<button onclick="app.navigate(\'game_detail\', {app_id: \'' + appId + '\', lobby_name: ' + safeSingleQuoteStringify(lobbyName) + ', game_id: \'' + encodeURIComponent(g.id) + '\'})">Inspect</button>' +
                            '</td>' +
                        '</tr>';
            }

            container.innerHTML = '<div class="panel">' +
                '<div class="panel-header">' +
                    '<h2>Lobby ' + lobbyName + ' - Games</h2>' +
                    '<div class="controls">' +
                        '<input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">' +
                        '<button onclick="ui.downloadJSON()">Save JSON</button>' +
                    '</div>' +
                '</div>' +
                '<div class="table-container">' +
                    '<table id="dataTable">' +
                        '<thead>' +
                            '<tr>' +
                                '<th onclick="ui.sortTable(0)">ID</th>' +
                                '<th onclick="ui.sortTable(1)">Players</th>' +
                                '<th onclick="ui.sortTable(2)">Open</th>' +
                                '<th onclick="ui.sortTable(3)">Visible</th>' +
                                '<th>Action</th>' +
                            '</tr>' +
                        '</thead>' +
                        '<tbody>' + rows + '</tbody>' +
                    '</table>' +
                '</div>' +
            '</div>';
        });
    },

    renderGameDetail: function(container) {
        var appId = this.params.app_id;
        var lobbyName = this.params.lobby_name;
        var gameId = this.params.game_id;

        api.get('/apps/' + appId + '/lobbies/' + lobbyName + '/games/' + gameId, function(err1, game) {
            if (!game) return;

            api.get('/apps/' + appId + '/lobbies/' + lobbyName + '/games/' + gameId + '/actors', function(err2, actors) {
                var masterActor = null;
                if (actors) {
                    for (var i = 0; i < actors.length; i++) {
                        if (actors[i].actor_id === game.master_client_id) {
                            masterActor = actors[i];
                            break;
                        }
                    }
                }

                var masterName = masterActor ? (masterActor.user_id + ' (ID: ' + game.master_client_id + ')') : game.master_client_id;

                var actorRows = '<tr><td colspan="3">No actors</td></tr>';
                if (actors && actors.length > 0) {
                    actorRows = '';
                    for (var j = 0; j < actors.length; j++) {
                        var a = actors[j];
                        actorRows += '<tr>' +
                                        '<td>' + a.actor_id + '</td>' +
                                        '<td>' + a.user_id + '</td>' +
                                        '<td>' +
                                            '<button onclick="ui.loadActorDetail(this, \'' + appId + '\', ' + safeSingleQuoteStringify(lobbyName) + ', \'' + gameId + '\', ' + a.actor_id + ')">Detail</button>' +
                                        '</td>' +
                                     '</tr>' +
                                     '<tr id="actor-row-' + a.actor_id + '">' +
                                        '<td colspan="3" style="padding:0; border:none;">' +
                                            '<div id="actor-detail-' + a.actor_id + '" style="padding:15px; border-bottom:1px solid var(--border-color); background: rgba(0,0,0,0.3); border-left: 2px solid var(--brand-green);">Loading...</div>' +
                                        '</td>' +
                                     '</tr>';
                    }
                }

                container.innerHTML = '<div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem;">' +
                    '<div class="panel">' +
                        '<div class="panel-header"><h2>Game: ' + game.id + '</h2></div>' +
                        '<table style="margin-bottom:1rem; background:transparent;">' +
                            '<tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Master Client:</strong></td><td style="border:none;">' + masterName + '</td></tr>' +
                            '<tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Player TTL:</strong></td><td style="border:none;">' + game.player_ttl + 'ms</td></tr>' +
                            '<tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Empty TTL:</strong></td><td style="border:none;">' + game.empty_room_ttl + 'ms</td></tr>' +
                            '<tr><td style="border:none; padding-left:0; color:var(--brand-green);"><strong>Flags:</strong></td><td style="border:none;">' + game.flags + '</td></tr>' +
                        '</table>' +
                        '<h3 style="margin-top:1rem; padding-bottom:0.5rem; border-bottom:1px solid var(--border-color);">Properties</h3>' +
                        '<pre class="json-dump" style="margin-top:10px;">' + safeSingleQuoteStringify(game.full_props, null, 2) + '</pre>' +
                    '</div>' +
                    '<div class="panel">' +
                        '<div class="panel-header"><h2>Actors (' + (actors ? actors.length : 0) + ')</h2></div>' +
                        '<div class="table-container" style="overflow-y:auto;">' +
                            '<table style="width:100%;">' +
                                '<thead>' +
                                    '<th style="position:sticky; top:0; background-color:#0d1117;">ID</th>' +
                                    '<th style="position:sticky; top:0; background-color:#0d1117;">User</th>' +
                                    '<th style="position:sticky; top:0; background-color:#0d1117;">Action</th>' +
                                '</thead>' +
                                '<tbody>' + actorRows + '</tbody>' +
                            '</table>' +
                        '</div>' +
                    '</div>' +
                '</div>';
            });
        });
    },

    renderTablePage: function(container, title, flattenedData, rawData) {
        if (!flattenedData || !flattenedData.length) {
            container.innerHTML = '<div class="panel">' +
                '<div class="panel-header"><h2>' + title + '</h2></div>' +
                '<p style="color:var(--text-muted)">No data available.</p>' +
            '</div>';
            return;
        }

        var headers = [];
        for (var key in flattenedData[0]) {
            if (flattenedData[0].hasOwnProperty(key)) {
                headers.push(key);
            }
        }

        var headerHtml = "";
        for (var i = 0; i < headers.length; i++) {
            headerHtml += '<th onclick="ui.sortTable(' + i + ')">' + headers[i] + '</th>';
        }

        var rowsHtml = "";
        for (var j = 0; j < flattenedData.length; j++) {
            var row = flattenedData[j];
            rowsHtml += '<tr>';
            for (var k = 0; k < headers.length; k++) {
                rowsHtml += '<td>' + row[headers[k]] + '</td>';
            }
            rowsHtml += '</tr>';
        }

        container.innerHTML = '<div class="panel">' +
            '<div class="panel-header">' +
                '<h2>' + title + '</h2>' +
                '<div class="controls">' +
                    '<input type="text" id="filterInput" placeholder="Filter..." onkeyup="ui.filterTable()">' +
                    '<button onclick="ui.downloadJSON()">Save JSON</button>' +
                '</div>' +
            '</div>' +
            '<div class="table-container">' +
                '<table id="dataTable">' +
                    '<thead><tr>' + headerHtml + '</tr></thead>' +
                    '<tbody>' + rowsHtml + '</tbody>' +
                '</table>' +
            '</div>' +
            '<div style="margin-top:0.5rem; font-size:0.8rem; color:var(--text-muted);">' +
                'Total: ' + flattenedData.length + ' entries' +
            '</div>' +
        '</div>';
    }
};

/**
 * UI UTILITIES
 */
var ui = {
    sortAsc: true,

    sortTable: function(colIndex) {
        var table = document.getElementById("dataTable");
        var tbody = table.querySelector("tbody");
        var rowsList = tbody.querySelectorAll("tr");

        var dataRows = [];
        for (var i = 0; i < rowsList.length; i++) {
            var r = rowsList[i];
            if (!r.id || r.id.indexOf('actor-row') !== 0) {
                dataRows.push(r);
            }
        }

        this.sortAsc = !this.sortAsc;
        var sortAscending = this.sortAsc;

        dataRows.sort(function(a, b) {
            var valA = a.cells[colIndex].innerText || a.cells[colIndex].textContent;
            var valB = b.cells[colIndex].innerText || b.cells[colIndex].textContent;
            valA = valA.toLowerCase();
            valB = valB.toLowerCase();

            var numA = parseFloat(valA);
            var numB = parseFloat(valB);

            if (!isNaN(numA) && !isNaN(numB)) {
                return sortAscending ? numA - numB : numB - numA;
            }

            if (valA < valB) return sortAscending ? -1 : 1;
            if (valA > valB) return sortAscending ? 1 : -1;
            return 0;
        });

        for (var j = 0; j < dataRows.length; j++) {
            tbody.appendChild(dataRows[j]);
        }
    },

    filterTable: function() {
        var input = document.getElementById("filterInput");
        var filter = input.value.toLowerCase();
        var table = document.getElementById("dataTable");
        var tr = table.getElementsByTagName("tr");

        for (var i = 1; i < tr.length; i++) {
            if (tr[i].id && tr[i].id.indexOf('actor-row') === 0) continue;
            var visible = false;
            var tds = tr[i].getElementsByTagName("td");
            for (var j = 0; j < tds.length; j++) {
                if (tds[j]) {
                    var cellText = tds[j].innerText || tds[j].textContent;
                    if (cellText.toLowerCase().indexOf(filter) > -1) {
                        visible = true;
                        break;
                    }
                }
            }
            tr[i].style.display = visible ? "" : "none";
        }
    },

    downloadJSON: function() {
        if (!app.dataCache) {
            alert("No data to save.");
            return;
        }
        var dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(safeSingleQuoteStringify(app.dataCache, null, 2));
        var downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "export_" + new Date().getTime() + ".json");
        document.body.appendChild(downloadAnchorNode);

        if (downloadAnchorNode.click) {
             downloadAnchorNode.click();
        } else {
             // Fallback for extremely old browsers
             window.open(dataStr, '_blank');
        }

        document.body.removeChild(downloadAnchorNode);
    },

    loadActorDetail: function(btn, appId, lobbyIdx, gameId, actorId) {
        var rowId = 'actor-row-' + actorId;
        var divId = 'actor-detail-' + actorId;
        var row = document.getElementById(rowId);

        if (row.style.display === 'table-row' || row.style.display === '') {
            row.style.display = 'none';
            btn.innerText = 'Detail';
            btn.textContent = 'Detail';
            return;
        }

        row.style.display = 'table-row';
        btn.innerText = 'Close';
        btn.textContent = 'Close';

        var container = document.getElementById(divId);

        api.get('/apps/' + appId + '/lobbies/' + lobbyIdx + '/games/' + gameId + '/actors/' + actorId, function(err, data) {
            if (!data) {
                container.innerHTML = "Error loading data.";
                return;
            }

            container.innerHTML = '<div style="display:flex; flex-wrap:wrap; gap:2rem;">' +
                '<div style="flex:1;">' +
                    '<strong style="color:var(--brand-green);">Properties:</strong>' +
                    '<pre class="json-dump" style="margin-top:5px;">' + safeSingleQuoteStringify(data.props, null, 2) + '</pre>' +
                '</div>' +
                '<div style="flex:1;">' +
                    '<strong style="color:var(--brand-green);">Connection:</strong>' +
                    '<ul style="padding-left:1.2rem; margin-top:5px;">' +
                        '<li>Peer ID: ' + (data.connection_info ? data.connection_info.peer_id : 'N/A') + '</li>' +
                        '<li>RTT: ' + (data.connection_info ? data.connection_info.rtt : '0') + 'ms</li>' +
                    '</ul>' +
                    '<strong style="color:var(--brand-green);">Groups:</strong> [' + (data.interest_groups ? data.interest_groups.join(', ') : '') + ']' +
                '</div>' +
            '</div>';
        });
    }
};

// App Init
window.onload = function() {
    app.init();
};

</script>
</body>
</html>
