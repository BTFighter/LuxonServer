<!DOCTYPE html>
<html lang="$lang$">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$if(title-prefix)$$title-prefix$ - $endif$$if(title)$$title$$endif$</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-navy: #00264d;
            --brand-navy-dark: #001a36;
            --brand-green: #9ddd00;
            --text-white: #ffffff;
            --text-gray: #b3c2d1;
            --code-bg: #0d1117;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(191, 255, 0, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--brand-navy) 0%, var(--brand-navy-dark) 100%);
            color: var(--text-gray);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* --- Hero Section --- */
        header {
            background: radial-gradient(circle at top right, rgba(191, 255, 0, 0.05), transparent 40%);
            padding: 4rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        h1 {
            color: var(--text-white);
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }
        
        /* Allows you to use <span> in your YAML title for green accents */
        h1 span { color: var(--brand-green); }

        .subtitle {
            font-size: 1.2rem;
            max-width: 700px;
            margin: 0 auto;
            color: var(--text-white);
            opacity: 0.9;
        }

        /* --- Main Content --- */
        main {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        /* --- Headings --- */
        h2 {
            color: var(--text-white);
            font-size: 2rem;
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            display: inline-block;
        }

        h3 {
            color: var(--brand-green);
            font-size: 1.3rem;
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        h4, h5, h6 { color: var(--text-white); margin-top: 1.5rem; }

        p { margin-bottom: 1.2rem; }

        strong { color: var(--text-white); font-weight: 600; }

        a {
            color: var(--brand-green);
            text-decoration: none;
            border-bottom: 1px dashed var(--brand-green);
            transition: all 0.2s;
        }
        a:hover { background-color: rgba(191, 255, 0, 0.1); }

        /* --- Lists --- */
        ul, ol { margin-bottom: 1.5rem; padding-left: 1.5rem; }
        li { margin-bottom: 0.5rem; }
        li::marker { color: var(--brand-green); }

        /* --- Blockquotes --- */
        blockquote {
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--brand-green);
            padding: 1.5rem;
            margin: 2rem 0;
            border-radius: 0 8px 8px 0;
            font-style: italic;
            color: var(--text-white);
        }

        /* --- Code Blocks --- */
        pre {
            background-color: var(--code-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 1.5rem;
            overflow-x: auto;
            margin: 1.5rem 0;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        code { font-family: 'Consolas', 'Monaco', monospace; }
        
        /* Inline code */
        p code, li code, h1 code, h2 code, h3 code {
            background-color: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            color: var(--brand-green);
            font-size: 0.9em;
        }

        /* Pandoc syntax highlighting compatibility */
        div.sourceCode { margin: 1em 0; }
        .sourceCode { color: #e6edf3; }
        .sourceCode .fu { color: var(--brand-green); } /* function */
        .sourceCode .at { color: #79c0ff; } /* attribute */
        .sourceCode .bu { color: #d2a8ff; } /* built-in */
        .sourceCode .kw { color: #ff7b72; } /* keyword */
        .sourceCode .st { color: #a5d6ff; } /* string */
        .sourceCode .co { color: #8b949e; font-style: italic; } /* comment */
        
        /* --- Extras --- */
        hr { border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 2rem 0; }
        
        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            main { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

    <header>
        $if(title)$
        <h1>$title$</h1>
        $endif$
        $if(subtitle)$
        <p class="subtitle">$subtitle$</p>
        $endif$
    </header>

    <main>
        $body$
    </main>

</body>
</html>
<!--Usage: pandoc README.md -o /tmp/readme.html --template=/tmp/luxon.html --standalone-->
